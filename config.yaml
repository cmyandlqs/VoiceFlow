hotkey:
  smart_combo: f10
  terminal_combo: f11

audio:
  sample_rate: 16000
  channels: 1
  dtype: int16
  max_record_seconds: 60

asr:
  endpoint: http://127.0.0.1:8000
  model: /home/sikm/Project/llm/qwen3-asr-1.7B
  timeout_seconds: 20
  language: zh
  prompt: ""

paste:
  enabled: true
  smart_mode: true
  default_shortcut: ctrl+v
  terminal_shortcut: ctrl+shift+v
  restore_clipboard: true

  terminal_classes:
    - gnome-terminal
    - konsole
    - xfce4-terminal
    - kitty
    - alacritty
    - wezterm
    - tilix
    - xterm
    - org.gnome.terminal

  terminal_title_keywords:
    - terminal
    - 终端
    - bash
    - zsh
    - fish
    - ssh
    - tmux
    - vim
    - nvim

ux:
  indicator: true
  indicator_follow_pointer: true
  start_beep: true
  end_beep: true
  error_beep: true
  notify: true

log:
  level: INFO
  file: ./logs/voice_input.log
